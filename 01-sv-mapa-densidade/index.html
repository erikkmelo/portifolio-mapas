        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>

        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: '#ffff00',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: '#ffff00',
                fillOpacity: 1
              });
            }
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:20, minZoom:1
        }).fitBounds([[-24.010469256631335,-46.50587201379527],[-23.928872425848233,-46.3545469673788]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleTerrain_0');
        map.getPane('pane_GoogleTerrain_0').style.zIndex = 400;
        var layer_GoogleTerrain_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleTerrain_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 20,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_GoogleTerrain_0;
        map.addLayer(layer_GoogleTerrain_0);
        function pop_Densidadedemogrficahabha_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td class="visible-with-data" id="CD_SETOR" colspan="2"><strong>CD_SETOR</strong><br />' + (feature.properties['CD_SETOR'] !== null ? autolinker.link(String(feature.properties['CD_SETOR']).replace(/'/g, '\'').replace(/"/g, '&quot;').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">V0001_Total de pessoas_Básico</th>\
                        <td class="visible-with-data" id="V0001">' + (feature.properties['V0001'] !== null ? autolinker.link(String(feature.properties['V0001']).replace(/'/g, '\'').replace(/"/g, '&quot;').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Densidade Demográfica (hab/ha)</th>\
                        <td class="visible-with-data" id="dens_demog">' + (feature.properties['dens_demog'] !== null ? autolinker.link(String(feature.properties['dens_demog']).replace(/'/g, '\'').replace(/"/g, '&quot;').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Área (ha)</th>\
                        <td class="visible-with-data" id="area_ha">' + (feature.properties['area_ha'] !== null ? autolinker.link(String(feature.properties['area_ha']).replace(/'/g, '\'').replace(/"/g, '&quot;').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Densidadedemogrficahabha_1_0(feature) {
            if (feature.properties['dens_demog'] >= 0.500000 && feature.properties['dens_demog'] <= 50.000000 ) {
                return {
                pane: 'pane_Densidadedemogrficahabha_1',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(43,131,186,0.7)',
                interactive: true,
            }
            }
            if (feature.properties['dens_demog'] >= 50.000000 && feature.properties['dens_demog'] <= 150.000000 ) {
                return {
                pane: 'pane_Densidadedemogrficahabha_1',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(145,203,168,0.7)',
                interactive: true,
            }
            }
            if (feature.properties['dens_demog'] >= 150.000000 && feature.properties['dens_demog'] <= 300.000000 ) {
                return {
                pane: 'pane_Densidadedemogrficahabha_1',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(221,241,180,0.7)',
                interactive: true,
            }
            }
            if (feature.properties['dens_demog'] >= 300.000000 && feature.properties['dens_demog'] <= 450.000000 ) {
                return {
                pane: 'pane_Densidadedemogrficahabha_1',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(254,223,153,0.7)',
                interactive: true,
            }
            }
            if (feature.properties['dens_demog'] >= 450.000000 && feature.properties['dens_demog'] <= 600.000000 ) {
                return {
                pane: 'pane_Densidadedemogrficahabha_1',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(245,144,83,0.7)',
                interactive: true,
            }
            }
            if (feature.properties['dens_demog'] >= 600.000000 && feature.properties['dens_demog'] <= 1000.000000 ) {
                return {
                pane: 'pane_Densidadedemogrficahabha_1',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(215,25,28,0.7)',
                interactive: true,
            }
            }
            if (feature.properties['dens_demog'] >= 1000.000000 && feature.properties['dens_demog'] <= 3000.000000 ) {
                return {
                pane: 'pane_Densidadedemogrficahabha_1',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(153,18,20,0.7)',
                interactive: true,
            }
            }
        }
        map.createPane('pane_Densidadedemogrficahabha_1');
        map.getPane('pane_Densidadedemogrficahabha_1').style.zIndex = 401;
        map.getPane('pane_Densidadedemogrficahabha_1').style['mix-blend-mode'] = 'normal';
        var layer_Densidadedemogrficahabha_1 = new L.geoJson(json_Densidadedemogrficahabha_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Densidadedemogrficahabha_1',
            layerName: 'layer_Densidadedemogrficahabha_1',
            pane: 'pane_Densidadedemogrficahabha_1',
            onEachFeature: pop_Densidadedemogrficahabha_1,
            style: style_Densidadedemogrficahabha_1_0,
        });
        bounds_group.addLayer(layer_Densidadedemogrficahabha_1);
        map.addLayer(layer_Densidadedemogrficahabha_1);
        function pop_LimiteMunicipalSoVicente_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_LimiteMunicipalSoVicente_2_0() {
            return {
                pane: 'pane_LimiteMunicipalSoVicente_2',
                opacity: 1,
                color: 'rgba(51,51,51,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(233,233,233,0.0)',
                interactive: false,
            }
        }
        map.createPane('pane_LimiteMunicipalSoVicente_2');
        map.getPane('pane_LimiteMunicipalSoVicente_2').style.zIndex = 402;
        map.getPane('pane_LimiteMunicipalSoVicente_2').style['mix-blend-mode'] = 'normal';
        var layer_LimiteMunicipalSoVicente_2 = new L.geoJson(json_LimiteMunicipalSoVicente_2, {
            attribution: '',
            interactive: false,
            dataVar: 'json_LimiteMunicipalSoVicente_2',
            layerName: 'layer_LimiteMunicipalSoVicente_2',
            pane: 'pane_LimiteMunicipalSoVicente_2',
            onEachFeature: pop_LimiteMunicipalSoVicente_2,
            style: style_LimiteMunicipalSoVicente_2_0,
        });
        bounds_group.addLayer(layer_LimiteMunicipalSoVicente_2);
        map.addLayer(layer_LimiteMunicipalSoVicente_2);
        var overlaysTree = [
            {label: '<img src="legend/LimiteMunicipalSoVicente_2.png" /> Limite Municipal - São Vicente', layer: layer_LimiteMunicipalSoVicente_2},
        {label: '<b>2025 - Densidade Demográfica</b>', selectAllCheckbox: true, children: [
            {label: 'Densidade demográfica (hab/ha)<br /><table><tr><td style="text-align: center;"><img src="legend/Densidadedemogrficahabha_1_1500.png" /></td><td>1 - 50</td></tr><tr><td style="text-align: center;"><img src="legend/Densidadedemogrficahabha_1_501501.png" /></td><td>50 - 150</td></tr><tr><td style="text-align: center;"><img src="legend/Densidadedemogrficahabha_1_1503002.png" /></td><td>150 - 300</td></tr><tr><td style="text-align: center;"><img src="legend/Densidadedemogrficahabha_1_3004503.png" /></td><td>300 - 450</td></tr><tr><td style="text-align: center;"><img src="legend/Densidadedemogrficahabha_1_4506004.png" /></td><td>450 - 600</td></tr><tr><td style="text-align: center;"><img src="legend/Densidadedemogrficahabha_1_60010005.png" /></td><td>600 - 1000</td></tr><tr><td style="text-align: center;"><img src="legend/Densidadedemogrficahabha_1_1000habha6.png" /></td><td>+1000 hab/ha</td></tr></table>', layer: layer_Densidadedemogrficahabha_1},]},
            {label: "Google Terrain", layer: layer_GoogleTerrain_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: false, 
        });
        lay.addTo(map);
		document.addEventListener("DOMContentLoaded", function() {
            // set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            // toggle Collapsed/Expanded and apply new Layers List height
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });	
			// apply new Layers List height if toggle layerstree
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
            // Collapsed/Expanded at Start to apply new height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            // Collapsed touch/small screen
            var isSmallScreen = window.innerWidth < 650;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });       
        setBounds();
        resetLabels([layer_Densidadedemogrficahabha_1]);
        map.on("zoomend", function(){
            resetLabels([layer_Densidadedemogrficahabha_1]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_Densidadedemogrficahabha_1]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_Densidadedemogrficahabha_1]);
        });
        </script>
